<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#1a1a2e;
    color:white;
    padding:40px;
    text-align:center;
    font-family:sans-serif;
}

h1{
    font-size:42px;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:30px;
    justify-items:center;
    margin-bottom:50px;
}

canvas{
    width:200px;
    height:300px;
}

.back-btn{
    padding:16px 40px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background: linear-gradient(135deg,#3a86ff,#5f9bff);
    color:white;
}
</style>
</head>

<body>

<audio id="startSound" src="/static/result.mp3"></audio>

<h1>결과</h1>

<div class="grid" id="box"></div>

<button class="back-btn" onclick="goHome()">돌아가기</button>

<script>
const data = JSON.parse(localStorage.getItem("result") || "[]");
const box = document.getElementById("box");

const startSound = document.getElementById("startSound");

function playStart(){
    startSound.currentTime = 0;
    startSound.play().catch(()=>{});
}

window.addEventListener("load", playStart);
document.body.addEventListener("click", playStart, { once:true });

function goHome(){
    location.href = "/";
}

function getColor(star){
    if(star==5) return "rgba(106,0,255,1)";
    if(star==4) return "rgba(255,215,0,1)";
    if(star==3) return "rgba(192,192,192,1)";
    if(star==2) return "rgba(184,115,51,1)";
    return "rgba(150,150,150,1)";
}

data.forEach(m=>{

    const canvas = document.createElement("canvas");
    canvas.width=256;
    canvas.height=384;

    const ctx = canvas.getContext("2d");

    const img = new Image();
    img.src = m.image;

    img.onload=()=>{

        const color = getColor(m.star);

        const back = ctx.createRadialGradient(128,192,10,128,192,200);
        back.addColorStop(0,color);
        back.addColorStop(1,"transparent");

        ctx.fillStyle = back;
        ctx.fillRect(0,0,256,384);

        ctx.drawImage(img,0,0,256,384);

        const front = ctx.createRadialGradient(128,192,60,128,192,180);
        front.addColorStop(0,"transparent");
        front.addColorStop(0.7,color);
        front.addColorStop(1,"transparent");

        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle = front;
        ctx.fillRect(0,0,256,384);

        ctx.globalCompositeOperation = "source-over";

        ctx.fillStyle="black";
        ctx.font="bold 20px sans-serif";
        ctx.textAlign="center";

        ctx.fillText(m.name,128,320);
        ctx.fillText("⭐".repeat(m.star),128,350);

        box.appendChild(canvas);
    };
});
</script>

</body>
</html>
