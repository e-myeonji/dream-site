<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>두근두근 급식 가챠</title>
<style>
body{
    margin:0;
    background: linear-gradient(135deg,#1a1a2e,#16213e);
    color:white;
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    overflow:hidden;
}

/* 코인 바 */
#coinBar{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    color:#222;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    font-weight:bold;
}


.coinIcon{
    font-size:18px;
}

/* 우측 상단 */
.top-right{
    position:absolute;
    top:20px;
    right:20px;
}

.small-btn{
    background:#444;
    color:white;
    border:none;
    padding:8px 12px;
    margin-left:8px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}

/* 중앙 타이틀 */
.center-title{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-60%);
    font-size:48px;
    font-weight:900;
    text-align:center;
    background: linear-gradient(90deg,#e94560,#3a86ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* 하단 버튼 */
.bottom-buttons{
    position:absolute;
    bottom:40px;
    right:40px;
    display:flex;
    gap:15px;
}

/* 큰 버튼 */
.big-btn{
    padding:18px 28px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#singleBtn{
    background:#e94560;
}

#multiBtn{
    background:#3a86ff;
}
</style>
</head>

<body>

<!-- 🔊 사운드 -->
<audio id="clickSound" src="/static/click.mp3"></audio>

<!-- 코인 -->
<div id="coinBar">
    <span id="coinText"></span>
    <span class="coinIcon">🪙</span>
</div>

<!-- 우측 상단 -->
<div class="top-right">
    <button class="small-btn" onclick="goAdmin()">관리자</button>
    <button class="small-btn" onclick="resetData()">RESET</button>
</div>

<!-- 중앙 -->
<div class="center-title">
    두근두근 급식 가챠
</div>

<!-- 하단 버튼 -->
<div class="bottom-buttons">
    <button id="singleBtn" class="big-btn" onclick="tryDraw(1)">1개 뽑기</button>
    <button id="multiBtn" class="big-btn"></button>
</div>

<script>
const ADMIN_PW = "1234";
const totalMenu = {{count}};

let savedCount = localStorage.getItem("menuCount");
if(savedCount != totalMenu){
    localStorage.setItem("coins", totalMenu);
    localStorage.setItem("menuCount", totalMenu);
    localStorage.removeItem("pool");
}

let coins = localStorage.getItem("coins");
if(coins === null){
    coins = totalMenu;
    localStorage.setItem("coins", coins);
}

coins = parseInt(coins);

const coinText = document.getElementById("coinText");
const multiBtn = document.getElementById("multiBtn");
const singleBtn = document.getElementById("singleBtn");

/* 🔊 사운드 */
const clickSound = document.getElementById("clickSound");

function playClick(){
    clickSound.currentTime = 0;
    clickSound.play();
}

function updateUI(){
    coinText.innerText = coins;

    if(coins <= 0){
        singleBtn.style.display = "none";
        multiBtn.style.display = "none";
        return;
    }

    singleBtn.style.display = "inline-block";
    multiBtn.style.display = "inline-block";

    multiBtn.innerText = coins + "연속 뽑기";
    multiBtn.onclick = () => tryDraw(coins);
}

updateUI();

function tryDraw(n){
    if(coins < n){
        alert("코인 부족");
        return;
    }

    coins -= n;
    localStorage.setItem("coins", coins);

    clickSound.currentTime = 0;
    clickSound.play();

    clickSound.onended = () => {
        location.href = "animation?count=" + n;
    };
}

function goAdmin(){
    playClick();
    const pw = prompt("비밀번호 입력");
    if(pw){
        location.href = "admin?pw=" + pw;
    }
}

function resetData(){
    playClick();
    const pw = prompt("비밀번호 입력");
    if(pw === ADMIN_PW){
        localStorage.clear();
        location.reload();
    } else {
        alert("비밀번호 틀림");
    }
}
</script>

</body>
</html>
