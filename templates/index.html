<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>두근두근 급식 가챠</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
    color:white;

    /* 🔥 배경 업그레이드 */
    background: radial-gradient(circle at top, #2a2a5a, #0f172a 70%);
}

/* ✨ 배경 빛 효과 */
.bg-glow{
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(58,134,255,0.4), transparent);
    top:-200px;
    left:-200px;
    filter: blur(120px);
}

.bg-glow2{
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(233,69,96,0.4), transparent);
    bottom:-200px;
    right:-200px;
    filter: blur(120px);
}

/* 🪙 코인 */
#coinBar{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    align-items:center;
    gap:10px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:12px 18px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.coinIcon{
    font-size:18px;
}

/* 🔧 우측 상단 */
.top-right{
    position:absolute;
    top:20px;
    right:20px;
}

.small-btn{
    background: rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
    transition:0.2s;
}

.small-btn:hover{
    background: rgba(255,255,255,0.2);
}

/* 🎯 타이틀 */
.center-title{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-70%);

    font-size:52px;
    font-weight:900;
    text-align:center;

    background: linear-gradient(90deg,#ff4d6d,#3a86ff,#8338ec);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* 🎮 버튼 영역 */
.bottom-buttons{
    position:absolute;
    bottom:50px;
    right:50px;
    display:flex;
    gap:20px;
}

/* 🔥 큰 버튼 */
.big-btn{
    padding:20px 34px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    cursor:pointer;

    color:white;
    position:relative;
    overflow:hidden;

    transition:0.2s;
}

/* 버튼 공통 glow */
.big-btn::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    opacity:0;
    transition:0.3s;
}

.big-btn:hover::before{
    opacity:1;
}

.big-btn:hover{
    transform: translateY(-3px) scale(1.03);
}

/* 🔴 1개 뽑기 */
#singleBtn{
    background: linear-gradient(135deg,#e94560,#ff6b81);
    box-shadow:0 10px 25px rgba(233,69,96,0.5);
}

/* 🔵 연속 뽑기 */
#multiBtn{
    background: linear-gradient(135deg,#3a86ff,#00c6ff);
    box-shadow:0 10px 25px rgba(58,134,255,0.5);
}
</style>
</head>

<body>

<!-- 배경 효과 -->
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<!-- 코인 -->
<div id="coinBar">
    <span id="coinText"></span>
    <span class="coinIcon">🪙</span>
</div>

<!-- 우측 상단 -->
<div class="top-right">
    <button class="small-btn" onclick="goAdmin()">관리자</button>
    <button class="small-btn" onclick="resetData()">RESET</button>
</div>

<!-- 타이틀 -->
<div class="center-title">
    두근두근 급식 가챠
</div>

<!-- 버튼 -->
<div class="bottom-buttons">
    <button id="singleBtn" class="big-btn" onclick="tryDraw(1)">1개 뽑기</button>
    <button id="multiBtn" class="big-btn"></button>
</div>

<script>
const totalMenu = {{count}};

let savedCount = localStorage.getItem("menuCount");
if(savedCount != totalMenu){
    localStorage.setItem("coins", totalMenu);
    localStorage.setItem("menuCount", totalMenu);
    localStorage.removeItem("pool");
}

let coins = localStorage.getItem("coins");
if(coins === null){
    coins = totalMenu;
    localStorage.setItem("coins", coins);
}

coins = parseInt(coins);

const coinText = document.getElementById("coinText");
const multiBtn = document.getElementById("multiBtn");
const singleBtn = document.getElementById("singleBtn");

function updateUI(){
    coinText.innerText = coins;

    if(coins <= 0){
        singleBtn.style.display = "none";
        multiBtn.style.display = "none";
        return;
    }

    if(coins > 1){
        multiBtn.style.display = "inline-block";
        multiBtn.innerText = coins + "연속 뽑기";
        multiBtn.onclick = () => tryDraw(coins);
    } else {
        multiBtn.style.display = "none";
    }
}

updateUI();

function tryDraw(n){
    if(coins < n){
        alert("코인 부족");
        return;
    }

    coins -= n;
    localStorage.setItem("coins", coins);
    location.href = "animation?count=" + n;
}

// 🔐 관리자 로그인
function goAdmin(){
    const pw = prompt("비밀번호 입력");

    if(!pw) return;

    fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({pw})
    })
    .then(res=>{
        if(res.ok){
            location.href="/admin";
        }else{
            alert("비밀번호 틀림");
        }
    });
}

// 🔄 로컬 초기화
function resetData(){
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
